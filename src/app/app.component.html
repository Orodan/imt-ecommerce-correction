<app-menu></app-menu>

<div class="container">

<header class="jumbotron hero-spacer">
  <h1>{{ title }}</h1>
  <p>Your basket amounts to {{ getTotal() }} $</p>
  <p><a class="btn btn-primary btn-large">See my basket</a></p>
</header>

<hr>

<div class="row">
    <div class="col-lg-12">
        <h2>Last beers</h2>
    </div>
</div>
<div class="row text-center">
  <app-product class="col-md-3 col-sm-6" [data]="beers[0]" (addToBasket)="add($event)"></app-product>
  <app-product class="col-md-3 col-sm-6" [data]="beers[1]" (addToBasket)="add($event)"></app-product>
  <app-product class="col-md-3 col-sm-6" [data]="beers[2]" (addToBasket)="add($event)"></app-product>
  <app-product class="col-md-3 col-sm-6" [data]="beers[3]" (addToBasket)="add($event)"></app-product>

  <hr>

  <app-footer></app-footer>

</div>
