<mat-card class="product-item" [ngClass]="{ last: data.stock === 1 } ">
  <img [src]="data.image_url" alt="">

  <mat-card-content>
      <div class="content">
        <h3>{{ data.name }} - {{ data.price }}$</h3>
        <p>{{ data.tagline }}</p>
      </div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="onClick(data)">Add to basket</button>
  </mat-card-actions>
</mat-card>
